name: Build LightlyShaders

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v3.0.1)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: fedora:41

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y \
            cmake gcc-c++ make gettext extra-cmake-modules \
            qt6-qtbase-devel qt6-qtbase-private-devel qt6-qttools-devel \
            kf6-kconfig-devel kf6-kconfigwidgets-devel kf6-kcoreaddons-devel \
            kf6-kcrash-devel kf6-kglobalaccel-devel kf6-ki18n-devel \
            kf6-kio-devel kf6-kservice-devel kf6-knotifications-devel \
            kf6-kwidgetsaddons-devel kf6-kwindowsystem-devel \
            kf6-kguiaddons-devel kf6-kcmutils-devel \
            libepoxy-devel libdrm-devel \
            kwin-devel kdecoration-devel \
            git

      - name: Configure
        run: |
          mkdir qt6build && cd qt6build
          cmake ../ -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: |
          cd qt6build
          make -j$(nproc)

      - name: Install to staging
        run: |
          cd qt6build
          make install DESTDIR=$GITHUB_WORKSPACE/staging

      - name: Package
        run: |
          tar czf lightlyshaders-${{ inputs.tag }}-fedora.tar.gz -C staging usr

      - name: Create Release and upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          files: lightlyshaders-${{ inputs.tag }}-fedora.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
